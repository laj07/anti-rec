model:
  type: matrix_factorization
  dim: 64
  strategy: boundary
  k_neighbors: 20
  alpha: 0.8

data:
  path: data/ml-1m/ratings.dat
  titles_path: data/ml-1m/movies.dat
  min_ratings_per_user: 20
  val_split: 0.1
  sep: "::"
  column_map:
    "0": userId
    "1": movieId
    "2": rating
    "3": timestamp
  titles_column_map:
    "0": movieId
    "1": title
    "2": genres

training:
  epochs: 10
  batch_size: 512
  lr: 0.001
  weight_decay: 1.0e-5
  num_workers: 2

eval:
  metrics:
    - embedding_surprise
    - novelty
    - intra_list_diversity
  k: 10
  alpha: 0.8
  n_eval_users: 100
